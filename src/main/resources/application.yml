spring:

  application:
    name: BI_backend
  # 默认使用开发环境配置
  profiles:
    active: dev

  # 核心：数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

    # 建议加上时区和防乱码后缀
    # (?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    url: jdbc:mysql://localhost:3306/chartInformation?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "050217"

  # 核心：Redis 配置
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
      timeout: 5000ms
     # password: "050217"

  rabbitmq:
    host: localhost
    port: 5672
    password: guest
    username: guest

  # 文件上传限制（预留功能）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB


server:
  # 默认监听所有网卡
  address: 0.0.0.0
  # 启动端口
  port: 8080
  servlet:
    # 所有的接口都会带上 /api 前缀
    context-path: /api

mybatis-plus:
  configuration:
    # 关闭下划线转驼峰
    map-underscore-to-camel-case: false
    # 在控制台打印底层执行的 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 全局逻辑删除
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 接口文档配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    # 自定义文档访问路径
    path: /swagger-ui.html
  packages-to-scan: com.example.bi_backend.controller

knife4j:
  enable: true
  setting:
    language: zh_CN


kyle-ai:
    url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api-key: your_key
    model: glm-4-flash


